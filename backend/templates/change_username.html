{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
  <div class="card login-card">
    <header class="card-head row" style="justify-content: space-between; align-items: center;">
      <div class="row" style="gap:10px; align-items:center;">
        <h2>{{ T("app.menu.change_user") }}</h2>
        {% if totp_required %}
          <span class="tag info">{{ T("change.2fa_enabled") }}</span>
        {% endif %}
      </div>
      <a href="{{ url_for('editor.view_editor') }}" class="btn">{{ T("btn.back") }}</a>
    </header>

    <form method="post" class="form" autocomplete="off">
      <div class="form-row">
        <label class="muted">{{ T("change.current_user") }}</label>
        <div class="input" style="background:#1e293b; cursor:default;">
          {{ current_username }}
        </div>
      </div>

      <div class="form-row">
        <label for="username" class="muted">{{ T("change.new_user") }}</label>
        <input id="username" class="input" name="username" placeholder="{{ T("change.new_user") }}" required autocomplete="username" autofocus>
      </div>

      <div class="form-row">
        <label for="current-pass" class="muted">{{ T("change.current_pass") }}</label>
        <input id="current-pass" class="input" type="password" name="current" placeholder="••••••••" autocomplete="current-password" required>
        <small class="hint" id="caps-hint-current" hidden>{{ T("auth.caps_on") }}</small>
      </div>

      {% if totp_required %}
      <div class="form-row">
        <label for="totp" class="muted">{{ T("auth.2fa_code") }}</label>
        <input id="totp" class="input" name="totp" placeholder="000000" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code" required>
      </div>
      {% endif %}

      <div class="form-row">
        <button class="btn primary w-full" type="submit">{{ T("btn.save") }}</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Estado global do CapsLock (null = desconhecido)
  let capsOn = null;

  // Atualiza estado global a cada tecla
  function captureCaps(e) {
    if (e && e.getModifierState) {
      capsOn = e.getModifierState('CapsLock');
      // Atualiza o campo focado, se houver
      const active = document.activeElement;
      if (active && active.dataset && active.dataset.capsHintId) {
        const hint = document.getElementById(active.dataset.capsHintId);
        if (hint) hint.hidden = !(capsOn === true);
      }
    }
  }
  window.addEventListener('keydown', captureCaps, true);
  window.addEventListener('keyup',   captureCaps, true);

  // Liga o comportamento de CapsLock em um campo
  function bindCaps(inputId, hintId) {
    const input = document.getElementById(inputId);
    const hint  = document.getElementById(hintId);
    if (!input || !hint) return;

    // guarda referência do hint no próprio input
    input.dataset.capsHintId = hintId;

    // Ao focar: aplica imediatamente o último estado conhecido
    input.addEventListener('focus', () => {
      if (capsOn === null) {
        // ainda não sabemos: mantém oculto até a primeira tecla
        hint.hidden = true;
      } else {
        hint.hidden = !capsOn;
      }
    });

    // Teclas no próprio campo também atualizam
    input.addEventListener('keydown', captureCaps);
    input.addEventListener('keyup',   captureCaps);

    // Ao perder o foco, esconde a dica
    input.addEventListener('blur', () => { hint.hidden = true; });
  }

  // Ativar no campo
  bindCaps('current-pass', 'caps-hint-current');

  // 2FA: aceitar só 6 números
  const otp = document.getElementById('totp');
  if (otp) {
    otp.addEventListener('input', () => {
      otp.value = otp.value.replace(/\D/g,'').slice(0,6);
    });
  }

  // Evitar duplo submit
  const form = document.querySelector('form');
  const btn  = document.getElementById('btn-change-pass');
  if (form && btn) {
    form.addEventListener('submit', () => { btn.disabled = true; });
  }
</script>
{% endblock %}
